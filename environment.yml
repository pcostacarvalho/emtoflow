# Conda environment file for EMTO Input Automation
# ================================================
# Create environment: conda env create -f environment.yml
# Activate environment: conda activate emto-input-automation
# Update environment: conda env update -f environment.yml --prune

name: emto-input-automation
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.7
  - numpy>=1.19.0
  - scipy>=1.5.0
  - pandas>=1.3.0
  - matplotlib>=3.3.0
  - pyyaml>=5.4.0
  - pip
  - pip:
    - pymatgen>=2022.0.0
