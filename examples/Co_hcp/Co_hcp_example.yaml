output_path: "emto_inputs_Co_hcp"
job_name: "Co"  # should be < 10 characters

# Structure from lattice parameters (HCP Co)
cif_file: null
lat: 4
a: 2.51
b: null
c: 4.069
alpha: null
beta: null
gamma: null
sites:
  - position: [0.0, 0.0, 0.0]
    elements: ["Co"]
    concentrations: [1.0]
  - position: [0.3333, 0.6667, 0.5]
    elements: ["Co"]
    concentrations: [1.0]

# Parameter ranges (single-point, auto from structure)
ca_ratios: null
sws_values: null
initial_sws: null
auto_generate: false
ca_step: 0.02
sws_step: 0.05
n_points: 7

# EMTO calculation parameters
dmax: 1.8
magnetic: "P"
user_magnetic_moments: {"Co": 0.0}
functional: "GGA"

# Optimization settings (disabled for minimal example)
optimize_ca: false
optimize_sws: false
optimize_dmax: false
dmax_initial: 2.0
dmax_target_vectors: 100
dmax_vector_tolerance: 15

# K-mesh
nkx: 21
nky: 21
nkz: 21
rescale_k: false

# Execution / workflow
prepare_only: true
run_mode: "local"
prcs: 4
slurm_account: "name_of_project"
slurm_time: "02:00:00"
slurm_partition: "main"
create_job_script: false
job_mode: "serial"

# Executable paths (not required when optimizations & job scripts are disabled)
eos_executable: null
kstr_executable: null
shape_executable: null
kgrn_executable: null
kfcd_executable: null
atom_file: "/path/to/ATOM.cfg"  # Set this to your real ATOM.cfg when running KGRN

