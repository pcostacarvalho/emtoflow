# Conda environment file for EMTOFlow
# ===================================
# Create environment: conda env create -f env.yaml
# Activate environment: conda activate emtoflow
# Update environment: conda env update -f env.yaml --prune

name: emtoflow
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.7
  - numpy>=1.19.0
  - scipy>=1.5.0
  - pandas>=1.3.0
  - matplotlib>=3.3.0
  - pyyaml>=5.4.0
  - pip
  - pip:
      - pymatgen>=2022.0.0

